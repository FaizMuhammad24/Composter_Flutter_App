name: kompos_app
description: Aplikasi Monitoring Kompos dengan Role-Based Access
publish_to: 'none'
version: 2.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  shared_preferences: ^2.2.2
  intl: ^0.19.0
  fl_chart: ^0.68.0
  crypto: ^3.0.3
  google_fonts: ^6.1.0
  curved_navigation_bar: ^1.0.6
  firebase_core: ^4.5.0
  firebase_database: ^12.1.4
  csv: ^8.0.0
  share_plus: ^12.0.1
  path_provider: ^2.1.5
  flutter_local_notifications: ^21.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0

flutter:
  uses-material-design: true
  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Light.ttf
          weight: 300
        - asset: assets/fonts/Poppins-Regular.ttf
          weight: 400
        - asset: assets/fonts/Poppins-Medium.ttf
          weight: 500
        - asset: assets/fonts/Poppins-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700

